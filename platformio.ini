; PlatformIO Project Configuration File
;
; HALMET-Yanmar3GM30F-Data follows the repository organization and build style
; used by HALMET/SensESP firmware projects.

[platformio]
default_envs = halmet

[env]
upload_speed = 2000000
monitor_speed = 115200
lib_deps =
  SignalK/SensESP @ ^3.4.0
  adafruit/Adafruit SSD1306 @ ^2.5.1
  ttlappalainen/NMEA2000-library @ ^4.17.2
  NMEA2000_twai=https://github.com/skarlsson/NMEA2000_twai
  adafruit/Adafruit ADS1X15 @ ^2.5.0
  bblanchon/ArduinoJson @ 7.4.2
  paulstoffregen/OneWire @ ^2.3.8
  milesburton/DallasTemperature @ ^3.11.0
build_flags =
  -D HALMET_YANMAR3GM30F_DATA
  -D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_VERBOSE
  -D USE_ESP_IDF_LOG
board_build.partitions = min_spiffs.csv
build_unflags =
  -Werror=reorder
monitor_filters = esp32_exception_decoder
test_build_src = true
check_tool = clangtidy
check_flags =
  clangtidy: --fix --format-style=file --config-file=.clang-tidy

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Platform configurations follow

[arduino]
platform = espressif32 @ ^6.9.0
framework = arduino
lib_ignore =
  esp_websocket_client
build_flags =
  ${env.build_flags}
  -D TAG='"Arduino"'

[pioarduino]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
framework = arduino
lib_deps =
  ${env.lib_deps}
  esp_websocket_client=https://components.espressif.com/api/downloads/?object_type=component&object_id=b072eea5-4e65-4ced-94c3-d6f24207062d
build_flags =
  ${env.build_flags}
  -D SENSESP_SSL_SUPPORT=1

[espidf]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = espidf, arduino
board_build.embed_txtfiles =
  managed_components/espressif__esp_insights/server_certs/https_server.crt
  managed_components/espressif__esp_rainmaker/server_certs/rmaker_mqtt_server.crt
  managed_components/espressif__esp_rainmaker/server_certs/rmaker_claim_service_server.crt
  managed_components/espressif__esp_rainmaker/server_certs/rmaker_ota_server.crt
lib_deps =
  ${env.lib_deps}
  esp_websocket_client=https://components.espressif.com/api/downloads/?object_type=component&object_id=dbc87006-9a4b-45e6-a6ab-b286174cb413
build_flags =
  ${env.build_flags}
  -D SENSESP_SSL_SUPPORT=1

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Board configurations follow

[esp32]
board = esp32dev
build_flags =
  ${env.build_flags}
  -D BUTTON_BUILTIN=0
  -D LED_BUILTIN=2

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Permutations of platform and device.

[env:arduino_esp32]
extends = arduino, esp32
build_flags =
  ${arduino.build_flags}
  ${esp32.build_flags}

[env:pioarduino_esp32]
extends = pioarduino, esp32
build_flags =
  ${pioarduino.build_flags}
  ${esp32.build_flags}

[env:espidf_esp32]
extends = espidf, esp32
build_flags =
  ${espidf.build_flags}
  ${esp32.build_flags}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Individual board configurations

[env:halmet]
extends = pioarduino, esp32
board_build.partitions = default_8MB.csv
build_flags =
  ${pioarduino.build_flags}
  ${esp32.build_flags}
