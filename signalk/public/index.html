<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HALMET Yanmar 3GM30F Data</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <header>
      <h1>HALMET Yanmar 3GM30F Data</h1>
      <p>Engine data, derived values, and diagnostics from the Signal K server.</p>
    </header>

    <section class="grid">
      <article><span>RPM</span><strong id="rpm">--</strong></article>
      <article><span>Engine state</span><strong id="state">--</strong></article>
      <article><span>Fuel</span><strong id="fuel">--</strong></article>
      <article><span>Fuel remaining</span><strong id="remaining">--</strong></article>
      <article><span>Coolant</span><strong id="coolant">--</strong></article>
      <article><span>Oil pressure</span><strong id="oil">--</strong></article>
      <article><span>Alternator</span><strong id="alt">--</strong></article>
      <article><span>Engine room</span><strong id="engine-room">--</strong></article>
    </section>

    <section>
      <h2>Diagnostics</h2>
      <pre id="diagnostics">Loading...</pre>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
